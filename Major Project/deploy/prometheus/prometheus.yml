global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: ventilator_api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
    # If host.docker.internal fails (some Linux setups), replace with your host IP, e.g. 172.17.0.1:8000
