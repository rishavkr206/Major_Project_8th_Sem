name: Twin Quality Gate

on:
  workflow_dispatch:
  push:
    paths:
      - "services/digital_twin.py"
      - "services/audit_bridge.py"
      - "api/main.py"
      - "pipelines/evaluate_digital_twin.py"
      - "pipelines/historical_replay_benchmark.py"
      - "pipelines/run_phase1.py"
      - "pipelines/simulated_ingestion.py"
      - "tests/test_digital_twin_replay.py"
      - "tests/test_digital_twin_safety.py"
      - "tests/test_simulator_api.py"
      - ".github/workflows/twin-quality-gate.yml"
  pull_request:
    paths:
      - "services/digital_twin.py"
      - "services/audit_bridge.py"
      - "api/main.py"
      - "pipelines/evaluate_digital_twin.py"
      - "pipelines/historical_replay_benchmark.py"
      - "pipelines/run_phase1.py"
      - "pipelines/simulated_ingestion.py"
      - "tests/test_digital_twin_replay.py"
      - "tests/test_digital_twin_safety.py"
      - "tests/test_simulator_api.py"
      - ".github/workflows/twin-quality-gate.yml"

jobs:
  twin-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false  # historical CSV may be lfs-tracked; benchmark falls back to synthetic

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas "fastapi==0.115.0" "starlette>=0.37.2,<0.39.0" uvicorn httpx prometheus-client scikit-learn

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Generate synthetic Phase-1 dataset (fallback for benchmark)
        run: python pipelines/run_phase1.py

      - name: Synthetic-scenario quality gate
        run: python pipelines/evaluate_digital_twin.py --fail-on-thresholds

      - name: Historical-trajectory replay gate (uses simulated_phase1 if real CSV absent)
        run: python pipelines/historical_replay_benchmark.py --fail-on-thresholds --max-patients 24
