<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventilator OS - Test Cases</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
</head>
<body>
<div class="app-shell">
    <div id="nav"></div>
    <main class="page">
        <section class="page-header">
            <div>
                <div class="eyebrow">Scenario laboratory</div>
                <h1>LSTM Test Cases</h1>
                <p class="lede">Run controlled patient, infection, weather, and ventilator anomaly cases. Each result shows all predicted vitals and all risk heads, not only SpO2 and hypoxia.</p>
            </div>
            <div class="toolbar">
                <button id="run-tests" class="button"><i class="fas fa-play"></i> Run Cases</button>
                <a class="button secondary" href="models.html"><i class="fas fa-chart-simple"></i> Evaluation Metrics</a>
            </div>
        </section>

        <section class="grid cols-4" id="summary"></section>

        <section class="split-layout" style="margin-top: 16px;">
            <aside class="panel">
                <h2 class="panel-title">Case Groups</h2>
                <div class="side-list" id="case-groups"></div>
            </aside>
            <section class="section-stack" id="case-detail">
                <div class="panel muted">Click Run Cases to load the scenario outputs from the API.</div>
            </section>
        </section>
    </main>
</div>

<script src="app.js"></script>
<script>
const { nav, apiGet, alertClass, pct, num } = window.VentilatorApp;
document.getElementById("nav").innerHTML = nav("tests");

let scenarioData = {};
let activeGroup = "control";
const groupLabels = {
    control: "Baseline Control",
    lstm_history_length: "LSTM Length Tests",
    health_status: "Health Status",
    weather_impact: "Weather Impact",
    anomaly_detection: "Anomaly Detection"
};

function renderSummary(data) {
    const groups = Object.keys(data.results || {});
    const allCases = groups.flatMap(group => data.results[group].map(item => ({ group, item })));
    const critical = allCases.filter(x => x.item.alert_level === "CRITICAL").length;
    const warning = allCases.filter(x => x.item.alert_level === "WARNING").length;
    const avgHypoxia = allCases.reduce((sum, x) => sum + Number(x.item.hypoxia_prob || 0), 0) / Math.max(allCases.length, 1);
    document.getElementById("summary").innerHTML = `
        <div class="panel metric"><div class="metric-label">Total Cases</div><div class="metric-value">${data.total_scenarios}</div><div class="metric-note">Across all groups</div></div>
        <div class="panel metric"><div class="metric-label">Critical</div><div class="metric-value bad">${critical}</div><div class="metric-note">Immediate review</div></div>
        <div class="panel metric"><div class="metric-label">Warnings</div><div class="metric-value warn">${warning}</div><div class="metric-note">Elevated risk</div></div>
        <div class="panel metric"><div class="metric-label">Mean Hypoxia</div><div class="metric-value">${pct(avgHypoxia)}</div><div class="metric-note">Across scenario set</div></div>
    `;
}

function renderGroupButtons() {
    document.getElementById("case-groups").innerHTML = Object.keys(scenarioData).map(group => `
        <button class="${group === activeGroup ? "active" : ""}" onclick="selectGroup('${group}')">
            <strong>${groupLabels[group] || group}</strong>
            <div class="muted">${scenarioData[group].length} cases</div>
        </button>
    `).join("");
}

function riskRows(risks) {
    return Object.entries(risks || {}).map(([name, risk]) => `
        <tr>
            <td>${name.replaceAll("_", " ")}</td>
            <td>${pct(risk.probability)}</td>
            <td><span class="pill ${risk.risk ? "critical" : "stable"}">${risk.risk ? "Risk" : "Clear"}</span></td>
            <td>${num(risk.threshold, 2)}</td>
        </tr>
    `).join("");
}

function vitalRows(vitals) {
    return Object.entries(vitals || {}).map(([name, value]) => `
        <tr><td>${name.replaceAll("_", " ")}</td><td>${num(value, name.includes("SpO2") || name.includes("FiO2") ? 1 : 1)}</td></tr>
    `).join("");
}

function renderCase(test) {
    return `
    <article class="panel">
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:start;">
            <div>
                <h2 class="panel-title">${test.scenario_name}</h2>
                <div class="muted">${test.observations} observations | ${test.lstm_source}</div>
            </div>
            <span class="pill ${alertClass(test.alert_level)}">${test.alert_level}</span>
        </div>
        <div class="grid cols-3" style="margin:14px 0;">
            <div class="metric" style="border:1px solid var(--line); border-radius:8px; padding:12px;"><div class="metric-label">Predicted SpO2</div><div class="metric-value">${num(test.pred_spo2)}%</div></div>
            <div class="metric" style="border:1px solid var(--line); border-radius:8px; padding:12px;"><div class="metric-label">Hypoxia Risk</div><div class="metric-value ${test.hypoxia_prob >= .7 ? "bad" : test.hypoxia_prob >= .25 ? "warn" : "good"}">${pct(test.hypoxia_prob)}</div></div>
            <div class="metric" style="border:1px solid var(--line); border-radius:8px; padding:12px;"><div class="metric-label">History Length</div><div class="metric-value">${test.history_length}</div></div>
        </div>
        <div class="grid cols-2">
            <div>
                <h3 class="panel-title">Predicted Vitals</h3>
                <div class="table-wrap"><table><thead><tr><th>Output</th><th>Prediction</th></tr></thead><tbody>${vitalRows(test.predicted_vitals)}</tbody></table></div>
            </div>
            <div>
                <h3 class="panel-title">Risk Heads</h3>
                <div class="table-wrap"><table><thead><tr><th>Risk</th><th>Probability</th><th>Status</th><th>Threshold</th></tr></thead><tbody>${riskRows(test.risk_predictions)}</tbody></table></div>
            </div>
        </div>
        <h3 class="panel-title" style="margin-top:14px;">Findings</h3>
        <div class="muted">${(test.key_findings || []).map(f => `<div>- ${f}</div>`).join("")}</div>
    </article>`;
}

function selectGroup(group) {
    activeGroup = group;
    renderGroupButtons();
    document.getElementById("case-detail").innerHTML = (scenarioData[group] || []).map(renderCase).join("");
}

async function runTests() {
    const detail = document.getElementById("case-detail");
    detail.innerHTML = `<div class="panel muted"><i class="fas fa-spinner fa-spin"></i> Running test cases through the API...</div>`;
    const data = await apiGet("/tests/run-scenarios");
    scenarioData = data.results || {};
    activeGroup = scenarioData[activeGroup] ? activeGroup : Object.keys(scenarioData)[0];
    renderSummary(data);
    renderGroupButtons();
    selectGroup(activeGroup);
}

document.getElementById("run-tests").addEventListener("click", runTests);
runTests().catch(err => {
    document.getElementById("case-detail").innerHTML = `<div class="panel bad">Could not load test cases: ${err.message}</div>`;
});
</script>
</body>
</html>
