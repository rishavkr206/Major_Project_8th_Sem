<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ventilator Digital Twin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div class="max-w-6xl mx-auto p-6">
      <h1 class="text-2xl font-semibold mb-4">Ventilator Digital Twin - Live Dashboard</h1>
      <div class="grid grid-cols-3 gap-4">
        <div class="col-span-2 bg-white p-4 rounded shadow">
          <canvas id="telemetryChart" height="200"></canvas>
        </div>
        <div class="bg-white p-4 rounded shadow">
          <h2 class="font-medium mb-2">Controls</h2>
          <div class="space-y-2">
            <label>Oxygen (%)<input id="oxygenIn" type="number" class="ml-2 border p-1 w-24"/></label>
            <label>Pressure (cmH2O)<input id="pressureIn" type="number" class="ml-2 border p-1 w-24"/></label>
            <label>Breathing Rate<input id="breathingIn" type="number" class="ml-2 border p-1 w-24"/></label>
            <button id="applyBtn" class="mt-2 bg-blue-600 text-white px-3 py-1 rounded">Apply</button>
          </div>
          <h3 class="mt-4 font-medium">Alerts</h3>
          <ul id="alerts" class="mt-2 text-sm text-red-600"></ul>
          <h3 class="mt-4 font-medium">AI Predictions</h3>
          <div id="aiBox" class="mt-2 text-sm"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
